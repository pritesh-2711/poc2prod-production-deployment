{{- if .Values.mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "poc2prod.fullname" . }}-mcp
  labels:
    {{- include "poc2prod.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  replicas: {{ .Values.mcp.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: mcp
  template:
    metadata:
      labels:
        {{- include "poc2prod.labels" . | nindent 8 }}
        app.kubernetes.io/component: mcp
    spec:
      containers:
        - name: mcp
          image: {{ printf "%s:%s" .Values.mcp.image.repository .Values.mcp.image.tag | quote }}
          imagePullPolicy: {{ .Values.mcp.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.mcp.service.port }}
          env:
            {{- range $key, $value := .Values.mcp.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          envFrom:
            {{- if .Values.externalSecrets.enabled }}
            - secretRef:
                name: {{ .Values.externalSecrets.secretName }}
            {{- end }}
          resources:
            {{- toYaml .Values.mcp.resources | nindent 12 }}
{{- end }}


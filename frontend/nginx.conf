server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend (used only when running behind a single
    # nginx; in production the frontend talks directly to the ALB/API URL
    # baked in at build time via VITE_API_BASE_URL).
    # location /api/ {
    #     proxy_pass http://backend:8000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # SPA fallback — all routes that don't match a real file serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively; React's content-hashed filenames bust
    # the cache automatically when the bundle changes.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

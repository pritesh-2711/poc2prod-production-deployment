name: Legacy Helm Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Backend image tag to deploy
        required: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-south-1
  CLUSTER_NAME: poc2prod-prod
  NAMESPACE: poc2prod
  RELEASE_NAME: poc2prod

jobs:
  deploy:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$CLUSTER_NAME"

      - name: Deploy backend
        run: |
          helm upgrade --install "$RELEASE_NAME" helm/poc2prod \
            -n "$NAMESPACE" \
            --create-namespace \
            -f helm/poc2prod/values-prod.yaml \
            --set api.image.repository="${{ secrets.BACKEND_IMAGE_REPOSITORY }}" \
            --set api.image.tag="${{ inputs.image_tag }}" \
            --set cronjobs.image.repository="${{ secrets.BACKEND_IMAGE_REPOSITORY }}" \
            --set cronjobs.image.tag="${{ inputs.image_tag }}"

      - name: Wait for rollout
        run: kubectl rollout status "deploy/$RELEASE_NAME-api" -n "$NAMESPACE"

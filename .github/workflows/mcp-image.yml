name: MCP Image

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy this image after pushing it
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - main
    paths:
      - mcp/**
      - .github/workflows/mcp-image.yml
      - .github/workflows/deploy-images.yml

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-south-1
  CLUSTER_NAME: poc2prod-prod-eks
  NAMESPACE: poc2prod
  ECR_REPOSITORY: poc2prod-prod-mcp

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push MCP image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_REPOSITORY:latest" \
            mcp
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      - name: Configure kubeconfig
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy == 'true' }}
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$CLUSTER_NAME"

      - name: Deploy MCP
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy == 'true' }}
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          kubectl set image deployment/poc2prod-mcp mcp="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -n "$NAMESPACE"
          kubectl rollout status deployment/poc2prod-mcp -n "$NAMESPACE" --timeout=300s
